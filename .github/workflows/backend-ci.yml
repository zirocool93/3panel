name: backend-ci

on:
  push:
    paths:
      - "app/**"
      - "tests/**"
      - "pyproject.toml"
      - "alembic.ini"
      - ".github/workflows/backend-ci.yml"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --upgrade pip
      - run: pip install ".[dev]"
      - run: ruff check app tests
      - run: mypy app
      - run: pytest

