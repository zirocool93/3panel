name: vpnbotx

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vpnbotx}
      POSTGRES_USER: ${POSTGRES_USER:-vpnbotx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vpnbotx}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vpnbotx} -d ${POSTGRES_DB:-vpnbotx}"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend_api:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    env_file: .env
    environment:
      VPNBOTX_INSTALL_DIR: /deployment
    command: ["sh", "-c", "vpnbotx migrate && uvicorn app.api.main:app --host 0.0.0.0 --port 8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "8000:8000"
    volumes:
      - ./:/deployment

  telegram_bot:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    env_file: .env
    command: ["python", "-m", "app.bot.main"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    env_file: .env
    command: ["celery", "-A", "app.workers.celery_app.celery_app", "worker", "--loglevel=INFO"]
    depends_on:
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    env_file: .env
    command: ["celery", "-A", "app.workers.celery_app.celery_app", "beat", "--loglevel=INFO"]
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: frontend
      dockerfile: ../infra/docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    ports:
      - "5173:80"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      backend_api:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  redis_data:
